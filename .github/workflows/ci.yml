name: CI

on:
  push:
    branches: [main, 'feature/*']
  pull_request:
    branches: [main, 'feature/*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: go test -v ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: go test -v -tags=integration ./test/integration/...

  # Validate the GoReleaser pipeline (including the nfpms: deb block) without
  # publishing anything. Catches broken nfpm config before it hits a real tag.
  release-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --snapshot --clean --skip=publish,announce,sign
      - name: Validate the deb artifacts
        run: |
          set -e
          for arch in amd64 arm64; do
            deb=$(ls dist/envsecrets_*_${arch}.deb 2>/dev/null | head -1)
            [ -n "$deb" ] || { echo "no $arch deb produced"; ls -la dist/; exit 1; }
            echo "=== validating $deb ==="
            dpkg-deb --info "$deb"
            dpkg-deb --contents "$deb"
            dpkg-deb --field "$deb" Package | grep -qx 'envsecrets'
            dpkg-deb --field "$deb" Architecture | grep -qx "$arch"
            dpkg-deb --contents "$deb" | grep -q ' \./usr/local/bin/envsecrets$'
          done
